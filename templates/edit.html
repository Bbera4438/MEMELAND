<!DOCTYPE html>
<html lang="ru" class="theme-{{ theme }}">
<head>
    <meta charset="UTF-8">
    <title>Редактировать мем</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1725;
            --glass-bg: rgba(10, 25, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #e0e8f0;
            --text-secondary: #9aafc4;
            --heading: #b3d9ff;
            --accent: #5da5d9;
            --accent-hover: #7bb8e8;
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.15);
            --button-bg: rgba(80, 150, 220, 0.3);
            --button-hover: rgba(80, 150, 220, 0.6);
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .theme-light {
            --bg: #e0f0fa;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text: #1a2a40;
            --text-secondary: #506680;
            --heading: #2c5f8a;
            --accent: #4a90c2;
            --accent-hover: #6aa3d4;
            --input-bg: rgba(255, 255, 255, 0.6);
            --input-border: rgba(255, 255, 255, 0.8);
            --button-bg: rgba(90, 180, 255, 0.4);
            --button-hover: #5bb4ff;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            background-image: url('/static/nyan-cat.gif');
            background-repeat: repeat;
            background-size: 200px;
            background-blend-mode: overlay;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px 30px;
            width: 450px;
            box-shadow: var(--shadow);
        }
        h2 {
            font-weight: 700;
            font-size: 28px;
            color: var(--heading);
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text);
        }
        input, textarea {
            width: 100%;
            padding: 12px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            resize: vertical;
        }
        textarea {
            border-radius: 20px;
            min-height: 100px;
        }
        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            padding: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-cancel {
            background: var(--button-bg);
            border: 1px solid var(--glass-border);
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
            font-size: 16px;
        }
        .btn-cancel:hover {
            background: var(--button-hover);
        }
        p {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="form-box">
    <h2>✏️ Редактировать мем</h2>
    <form method="POST">
        <label for="title">Название</label>
        <input type="text" id="title" name="title" value="{{ meme.title }}" required>

        <label for="origin">Происхождение / описание</label>
        <textarea id="origin" name="origin" required>{{ meme.origin }}</textarea>

        <label for="media_url">Ссылка на медиа (необязательно)</label>
        <input type="text" id="media_url" name="media_url" value="{{ meme.media_url or '' }}" placeholder="https://...">

        <div class="button-group">
            <button type="submit">Сохранить</button>
            <a href="/" class="btn-cancel">Отмена</a>
        </div>
    </form>
    <p><a href="/">← На главную</a></p>
</div>
</body>
</html>
